workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - compile
  - check
  - test
  - publish

.artifact-reports: &artifact-reports
  name: reports
  when: always
  paths: [ "**/build/reports", "**/build/**/yarn.lock", "**/build/kotlin/abi-legacy" ]
  reports:
    junit: "**/build/test-results/**/TEST-*.xml"
    coverage_report:
      coverage_format: jacoco
      path: build/reports/kover/report.xml

.if-merge-request: &if-merge-request
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'

.if-dev-release: &if-dev-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
    when: never
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: '$CI_COMMIT_BRANCH =~ /^v-\d+.\d+.\d+.*/'

compile:mac:
  stage: compile
  interruptible: true
  tags: [ "connect2x-mac" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      compileKotlin{IosArm64,IosSimulatorArm64,IosX64,MacosArm64,MacosX64}
      compileTestKotlin{IosSimulatorArm64,IosX64,MacosArm64,MacosX64}
      --stacktrace

compile:linux:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      compileKotlin{Jvm,Js,WasmJs,LinuxX64,MingwX64}
      compileReleaseKotlinAndroid
      compileTestKotlin{Jvm,Js,WasmJs,LinuxX64,MingwX64}
      compileReleaseUnitTestKotlinAndroid
      --stacktrace

check:vulnerable-dependencies:
  stage: check
  interruptible: true
  timeout: 30m
  needs: [ ]
  tags: [ "connect2x-linux-shell-small" ]
  variables:
    WITH_LOCK: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "schedule"
      allow_failure: false
  artifacts:
    when: always
    reports:
      dependency_scanning: report.json
  script:
    - ./gradlew dependenciesForAll --write-locks > dependencies.txt
    - trivy repo ./ --exit-code 0
    - trivy repo ./ --exit-code 0 --format template --template "@/usr/local/share/trivy/templates/gitlab.tpl" --output report.json
    - trivy repo ./ --exit-code 1 --severity CRITICAL

check:changelog:
  stage: check
  interruptible: true
  timeout: 5m
  tags: [ "connect2x-linux-shell-small" ]
  image:
    name: alpine/git:latest
    entrypoint: [ "" ] # tell gitlab to use `sh` instead of `git sh`
  rules:
    - *if-merge-request
  script:
    - git fetch origin main
    - |
      if git diff --name-only HEAD origin/main | grep "CHANGELOG.md"; then
        echo "CHANGELOG.md has changed"
      else
        echo "CHANGELOG.md has not changed"
        exit 1
      fi

# requires macOS since it can build/emulate all other targets
check:abi:
  stage: check
  interruptible: true
  timeout: 1h
  needs: [ "compile:mac" ]
  tags: [ "connect2x-mac" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew dumpLegacyAbi --stacktrace
    - ./gradlew checkLegacyAbi --stacktrace

test:unit:ios:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:mac" ]
  tags: [ "connect2x-mac" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      {iosSimulatorArm64,iosX64}Test
      testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:unit:mac:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:mac" ]
  tags: [ "connect2x-mac" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      {macosArm64,macosX64}Test
      testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:unit:jvm:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:linux" ]
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      {jvm,testReleaseUnit}Test -x :trixnity-client:integration-tests:jvmTest
      testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:unit:linux:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:linux" ]
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      {linuxX64,mingwX64}Test
      testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:unit:js:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:linux" ]
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      {js,wasmJs}Test
      testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:integration:jvm:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "compile:linux" ]
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-client:integration-tests:jvmTest
      -Dkotlinx.coroutines.debug
      --stacktrace

publish:snapshot:
  stage: publish
  tags: [ "connect2x-mac" ]
  timeout: 2h
  rules:
    - *if-dev-release
  artifacts:
    paths:
      - website/static/api/
  script:
    - ./gradlew
      publishAllPublicationsToGitLabRepository
      dokkaHtmlToWebsite
      --stacktrace

publish:release:
  stage: publish
  tags: [ "connect2x-mac" ]
  timeout: 2h
  rules:
    - *if-release
  script:
    - ./gradlew
      publishAllPublicationsToGitLabRepository
      publishAndReleaseToMavenCentral
      --stacktrace

pages:
  stage: publish
  tags: [ "connect2x-linux" ]
  image: node:lts
  rules:
    - *if-dev-release
    - if: '$CI_COMMIT_BRANCH =~ /^v-\d+.\d+.\d+.*/'
      when: never
  script:
    - cd website
    - yarn install --force
    - yarn build
    - mv ./build ../public
  artifacts:
    paths:
      - public
